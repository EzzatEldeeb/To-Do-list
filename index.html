<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>To DO list T_T</title>
  </head>
  <body>
    <div class="main">
      <div class="card">
        <div class="add-task">
          <input
            type="text"
            placeholder="Enter your To Do ..."
            required
            id="input"
          />
          <button type="button" id="btn">Add To Do</button>
        </div>
        <div class="task-holder" id="task-holder"></div>
      </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="main.js"></script>
  </body>
</html>
